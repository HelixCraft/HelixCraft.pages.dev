<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HelixCraft</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Instrument+Sans:wght@400;500;600;700&family=Fira+Code:wght@300;400;500&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/style.css" />
  </head>
  <body>
    <nav>
      <div class="nav-inner">
        <a class="nav-logo" href="/" data-link>
          <img
            src="https://cdn.modrinth.com/user/d1i0RLDm/f4748ef6959f14f70cfe7f35867ebbea6c62a7ee_96.webp"
            alt="HelixCraft"
            onerror="this.src = 'https://github.com/HelixCraft.png'"
          />
          HelixCraft
        </a>
        <div class="nav-tabs">
          <a class="nav-tab" href="/" data-link>Projects</a>
          <a class="nav-tab" href="/activity" data-link>Activity</a>
          <a class="nav-tab" href="/about" data-link>About</a>
          <a class="nav-tab" href="/donate" data-link>Donate</a>
        </div>
        <div class="nav-right">
          <button
            class="theme-toggle"
            onclick="toggleTheme()"
            aria-label="Toggle theme"
          >
            <svg
              class="sun-icon"
              width="16"
              height="16"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
            >
              <circle cx="12" cy="12" r="5" />
              <line x1="12" y1="1" x2="12" y2="3" />
              <line x1="12" y1="21" x2="12" y2="23" />
              <line x1="4.22" y1="4.22" x2="5.64" y2="5.64" />
              <line x1="18.36" y1="18.36" x2="19.78" y2="19.78" />
              <line x1="1" y1="12" x2="3" y2="12" />
              <line x1="21" y1="12" x2="23" y2="12" />
              <line x1="4.22" y1="19.78" x2="5.64" y2="18.36" />
              <line x1="18.36" y1="5.64" x2="19.78" y2="4.22" />
            </svg>
            <svg
              class="moon-icon"
              width="16"
              height="16"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
            >
              <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z" />
            </svg>
          </button>
          <div class="nav-status">
            <div class="status-dot"></div>
            open source
          </div>
        </div>
      </div>
    </nav>

    <div id="app"></div>

    <div class="footer">
      <div class="wrap">
        © 2024 HelixCraft · Built with passion for open source
      </div>
    </div>

    <script src="/script.js"></script>
  </body>
</html>
